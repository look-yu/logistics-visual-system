<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API测试</title>
</head>
<body>
    <h1>API连接测试</h1>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在测试API连接...</p>';
            
            try {
                // 测试代理路径
                console.log('测试代理路径: /api/orders?order_no=ORD20260315001&page=1&size=1');
                const response = await fetch('/api/orders?order_no=ORD20260315001&page=1&size=1');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h2>✅ API连接成功</h2>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                console.log('API响应:', data);
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2>❌ API连接失败</h2>
                    <p>错误: ${error.message}</p>
                    <p>请检查:</p>
                    <ul>
                        <li>前端开发服务器是否运行 (http://localhost:5173)</li>
                        <li>后端API是否运行 (http://localhost:5001)</li>
                        <li>浏览器控制台是否有错误</li>
                    </ul>
                `;
                console.error('API测试失败:', error);
            }
        }
        
        testAPI();
    </script>
</body>
</html>
